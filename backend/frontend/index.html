<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureMsg</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- =====================================================================
       AUTH SECTION
       Shown when no JWT is present in localStorage.
       TODO: Replace with a proper SPA router (or keep as a simple toggle).
  ====================================================================== -->
  <section id="auth-section">
    <h1>SecureMsg</h1>

    <div id="login-form">
      <h2>Login</h2>
      <input type="text" id="login-username" placeholder="Username" />
      <input type="password" id="login-password" placeholder="Password" />
      <button id="btn-login">Login</button>
      <p>No account? <a href="#" id="show-register">Register</a></p>
    </div>

    <div id="register-form" style="display:none;">
      <h2>Register</h2>
      <input type="text" id="reg-username" placeholder="Username" />
      <input type="email" id="reg-email" placeholder="Email" />
      <input type="password" id="reg-password" placeholder="Password (min 12 chars)" />
      <!--
        Key generation happens automatically in app.js using the Web Crypto API.
        The private key is stored ONLY in IndexedDB — never sent to the server.
      -->
      <button id="btn-register">Register &amp; Generate Keys</button>
      <p>Have an account? <a href="#" id="show-login">Login</a></p>
    </div>
  </section>

  <!-- =====================================================================
       MAIN APP SECTION
       Shown after successful login.
  ====================================================================== -->
  <section id="app-section" style="display:none;">

    <aside id="sidebar">
      <h2>Contacts</h2>
      <!-- TODO: Populate from GET /api/auth/user/{username}/pubkeys lookups -->
      <ul id="contact-list"></ul>
      <input type="text" id="new-contact" placeholder="Add contact by username" />
      <button id="btn-add-contact">Add</button>
      <hr />
      <button id="btn-logout">Logout</button>
    </aside>

    <main id="chat-area">
      <header id="chat-header">
        <span id="chat-recipient">Select a contact</span>
        <!-- TODO: Show blockchain confirmation badge per message -->
      </header>

      <div id="message-list">
        <!-- Messages injected here by app.js -->
      </div>

      <footer id="compose-area">
        <textarea id="plaintext-input" placeholder="Type a message…" rows="3"></textarea>
        <button id="btn-send">Send (Encrypted)</button>
      </footer>
    </main>

  </section>

  <script type="module" src="crypto.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>

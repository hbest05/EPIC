<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureMsg</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- =====================================================================
       AUTH SECTION — shown when no session is present
  ====================================================================== -->
  <section id="auth-section">
    <h1>SecureMsg</h1>

    <!-- Login form -->
    <div id="login-form">
      <h2>Login</h2>
      <div class="field">
        <input type="text" id="login-username" placeholder="Username" autocomplete="username" />
        <span class="field-error" id="login-username-error"></span>
      </div>
      <div class="field">
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" />
        <span class="field-error" id="login-password-error"></span>
      </div>
      <span class="field-error form-error" id="login-form-error"></span>
      <button id="btn-login">Login</button>
      <p>No account? <a href="#" id="show-register">Register</a></p>
    </div>

    <!-- Register form -->
    <div id="register-form" style="display:none;">
      <h2>Register</h2>
      <div class="field">
        <input type="text" id="reg-username" placeholder="Username (3–20 chars)" autocomplete="username" />
        <span class="field-error" id="reg-username-error"></span>
      </div>
      <div class="field">
        <input type="email" id="reg-email" placeholder="Email" autocomplete="email" />
        <span class="field-error" id="reg-email-error"></span>
      </div>
      <div class="field">
        <input type="password" id="reg-password" placeholder="Password (min 12 chars)" autocomplete="new-password" />
        <span class="field-error" id="reg-password-error"></span>
      </div>
      <span class="field-error form-error" id="reg-form-error"></span>
      <button id="btn-register">Register &amp; Generate Keys</button>
      <p>Have an account? <a href="#" id="show-login">Login</a></p>
    </div>
  </section>

  <!-- =====================================================================
       MAIN APP SECTION — shown after successful login
  ====================================================================== -->
  <section id="app-section" style="display:none;">

    <aside id="sidebar">
      <h2>Contacts</h2>
      <ul id="contact-list"></ul>
      <input type="text" id="new-contact" placeholder="Add contact by username" />
      <button id="btn-add-contact">Add</button>
      <hr />
      <button id="btn-logout">Logout</button>
    </aside>

    <main id="chat-area">
      <header id="chat-header">
        <span id="chat-recipient">Select a contact</span>
      </header>

      <div id="message-list">
        <!-- Messages injected here by app.js -->
      </div>

      <footer id="compose-area">
        <textarea id="plaintext-input" placeholder="Type a message…" rows="3"></textarea>
        <button id="btn-send">Send (Encrypted)</button>
      </footer>
    </main>

  </section>

  <script type="module" src="crypto.js?v=2"></script>
  <script type="module" src="app.js?v=4"></script>
</body>
</html>

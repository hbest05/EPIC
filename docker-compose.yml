version: "3.9"

# SecureMsg — local development stack
#
# Services:
#   api      — FastAPI backend (auto-reloads on code change in dev mode)
#   db       — PostgreSQL 16
#   redis    — Redis 7 (blockchain write queue)
#
# Usage:
#   docker compose up --build        # start all services
#   docker compose down -v           # stop and delete volumes
#   docker compose logs -f api       # tail backend logs

services:

  # ---------------------------------------------------------------------------
  # FastAPI backend
  # ---------------------------------------------------------------------------
  api:
    build:
      # Context is repo root so the Dockerfile can COPY blockchain/MessageDigestRegistryABI.json
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://securemsg:securemsg@db:5432/securemsg
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      APP_ENV: development
      # Blockchain — leave blank to run without on-chain recording.
      # Copy .env.example to .env and set these after deploying the contract.
      PRIVATE_KEY: "${PRIVATE_KEY:-}"           # optional — blockchain writes skipped if unset
      RPC_URL: "${RPC_URL:-https://rpc2.sepolia.org}"
      CONTRACT_ADDRESS: "${CONTRACT_ADDRESS:-}" # optional — blockchain writes skipped if unset
    volumes:
      # Mount backend source for hot-reload in development.
      # /abi/ (where the ABI JSON lives in the image) is NOT under /app
      # so it is not shadowed by this mount.
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: securemsg
      POSTGRES_PASSWORD: securemsg
      POSTGRES_DB: securemsg
    ports:
      - "5433:5432"    # expose for local DB tools (TablePlus, psql)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securemsg -d securemsg"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis — blockchain write queue (streams)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "127.0.0.1:6379:6379"   # bind to localhost only — never expose externally
    command: "redis-server --requirepass ${REDIS_PASSWORD} --save '' --appendonly no"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:

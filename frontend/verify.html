<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alphra — Verify integrity</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Allow the right panel to scroll when results expand */
    body          { overflow: auto; }
    #auth-section { height: auto; min-height: 100vh; }
    .auth-right   { align-items: flex-start; padding-top: 60px; padding-bottom: 60px; }

    /* Textarea styled to match the rounded pill inputs */
    .auth-form-container textarea {
      width: 100%;
      background: rgba(180, 170, 195, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 14px;
      color: #fff;
      padding: 14px 22px;
      font-family: var(--font-serif);
      font-size: 15px;
      outline: none;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      resize: vertical;
      min-height: 80px;
      transition: box-shadow 0.2s;
    }
    .auth-form-container textarea::placeholder { color: rgba(255, 255, 255, 0.5); }
    .auth-form-container textarea:focus { box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.25); }

    /* Small field labels above inputs */
    .verify-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.45);
      font-family: var(--font-serif);
      margin-bottom: -10px;
      letter-spacing: 0.03em;
    }

    /* Result container */
    #result  { width: 100%; }
    #spinner { display: none; font-size: 13px; color: rgba(255,255,255,0.45); font-style: italic; font-family: var(--font-serif); }

    /* Verdict banners */
    .verdict {
      width: 100%;
      padding: 14px 18px;
      border-radius: 10px;
      font-family: var(--font-serif);
      font-size: 15px;
      margin-bottom: 10px;
    }
    .pass    { background: rgba(52,211,153,0.12); border: 1px solid rgba(52,211,153,0.35); color: #34d399; }
    .fail    { background: rgba(239,68,68,0.12);  border: 1px solid rgba(239,68,68,0.35);  color: #f87171; }
    .neutral { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14); color: rgba(255,255,255,0.65); }

    /* Error banner */
    .error {
      padding: 14px 18px;
      border-radius: 10px;
      background: rgba(251,146,60,0.12);
      border: 1px solid rgba(251,146,60,0.35);
      color: #fb923c;
      font-family: var(--font-serif);
      font-size: 14px;
      width: 100%;
    }

    /* Result details table */
    .result-table { width: 100%; border-collapse: collapse; font-size: 13px; font-family: var(--font-serif); }
    .result-table td { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.07); color: rgba(255,255,255,0.7); word-break: break-all; }
    .result-table td:first-child { color: rgba(255,255,255,0.35); white-space: nowrap; width: 140px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    .result-table code { font-family: 'Courier New', monospace; font-size: 11px; }
    .result-table a { color: rgba(180,170,255,0.8); text-decoration: none; }
    .result-table a:hover { color: #fff; }

  </style>
</head>
<body>

  <section id="auth-section">

    <!-- Looping video background -->
    <video class="auth-video-bg" autoplay loop muted playsinline>
      <source src="/public/backgroundLogin.mp4" type="video/mp4" />
    </video>
    <div class="auth-video-overlay"></div>

    <!-- Top-left brand -->
    <div class="auth-brand">
      <img src="/public/chipmunkLogo.svg" alt="Alphra" />
      <span class="auth-brand-name">Alphra</span>
    </div>

    <!-- LEFT HALF -->
    <div class="auth-left">
      <img class="auth-blockchain-symbol" src="/public/blockchainSymbol.svg" alt="" />
      <div class="auth-tagline">
        <h1>Private messages.<br>Public proof.</h1>
        <p>End-to-end encrypted. Blockchain verified. Only you hold the keys.</p>
      </div>
    </div>

    <!-- RIGHT HALF -->
    <div class="auth-right">
      <div class="auth-form-container">

        <div class="auth-heading">
          <img src="/public/chipmunkLogo.svg" alt="" />
          <h2>Verify integrity</h2>
        </div>

        <p class="auth-sublink">or <a href="index.html">sign in →</a></p>

        <p style="font-size:13px;color:rgba(255,255,255,0.4);font-family:var(--font-serif);margin-top:-6px;line-height:1.65;">
          No login required. Enter the two usernames in the conversation to check its on-chain integrity record.
        </p>

        <label class="verify-label" for="userA">Your username</label>
        <input type="text" id="userA"
               placeholder="e.g. alice"
               spellcheck="false" autocomplete="off" />

        <label class="verify-label" for="userB">Other participant's username</label>
        <input type="text" id="userB"
               placeholder="e.g. bob"
               spellcheck="false" autocomplete="off" />

        <label class="verify-label" for="msgText">
          Ciphertext to verify
          <span style="opacity:0.6;">(optional)</span>
        </label>
        <textarea id="msgText"
                  placeholder="Paste the ciphertext here to compare against the on-chain digest…"></textarea>

        <button class="auth-submit-btn" id="btn-verify">Verify on blockchain</button>

        <div id="spinner">Contacting Sepolia…</div>
        <div id="result"></div>

        <a class="auth-verify-link" href="index.html">← Back to sign in</a>

      </div>
    </div>

  </section>

  <script src="verify.js"></script>

</body>
</html>

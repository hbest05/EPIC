<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureMsg — Blockchain Verification</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
  <style>
    body { font-family: monospace; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #fff; color: #111; }
    h1 { font-size: 1.2rem; border-bottom: 1px solid #ccc; padding-bottom: 8px; }
    label { display: block; margin-top: 16px; font-weight: bold; font-size: 0.9rem; }
    input, textarea { width: 100%; box-sizing: border-box; padding: 6px 8px; margin-top: 4px; font-family: monospace; font-size: 0.85rem; border: 1px solid #aaa; }
    textarea { height: 80px; resize: vertical; }
    button { margin-top: 16px; padding: 8px 20px; font-family: monospace; font-size: 0.9rem; cursor: pointer; }
    #result { margin-top: 24px; }
    .verdict { font-size: 1.4rem; font-weight: bold; padding: 10px; margin-bottom: 12px; }
    .pass { color: #1a7a1a; background: #eaffea; border: 1px solid #5cb85c; }
    .fail { color: #a00; background: #fff0f0; border: 1px solid #d9534f; }
    .error { color: #8a4000; background: #fff8f0; border: 1px solid #e88; padding: 10px; }
    table { border-collapse: collapse; width: 100%; margin-top: 12px; font-size: 0.82rem; }
    td { padding: 6px 8px; border: 1px solid #ddd; word-break: break-all; }
    td:first-child { white-space: nowrap; font-weight: bold; width: 180px; background: #f7f7f7; }
    a { color: #00c; }
    .local-section { margin-top: 16px; padding: 10px; background: #f5f5f5; border: 1px solid #ddd; font-size: 0.82rem; }
    .local-section strong { display: block; margin-bottom: 4px; }
    .match { color: #1a7a1a; } .mismatch { color: #a00; }
    #spinner { display: none; margin-top: 8px; font-style: italic; color: #555; }
  </style>
</head>
<body>

<h1>SecureMsg — Blockchain Tamper-Evidence Verification</h1>
<p style="font-size:0.85rem;color:#555;">
  Independently verify that a conversation digest exists on Ethereum Sepolia.
  No login required. Your text is hashed locally with keccak256 and compared
  against the on-chain record — the server never receives your plaintext.
</p>

<label for="convId">Conversation ID <span style="font-weight:normal;color:#777;">(format: {uuid}_{uuid})</span></label>
<input type="text" id="convId" placeholder="e.g. 0192abcd-…_0192ef01-…" spellcheck="false">

<label for="msgText">
  Ciphertext / message text to verify
  <span style="font-weight:normal;color:#777;">(optional — if blank, the server uses its stored ciphertext)</span>
</label>
<textarea id="msgText" placeholder="Paste the base64 ciphertext or message text here…"></textarea>

<button onclick="runVerify()">Verify on blockchain</button>
<div id="spinner">Contacting Sepolia…</div>
<div id="result"></div>

<script>
  // ---------------------------------------------------------------------------
  // Configuration — change API_BASE to your server's address if needed
  // ---------------------------------------------------------------------------
  const API_BASE = "http://localhost:8000";

  // ---------------------------------------------------------------------------
  // Local keccak256 using ethers.js (no server involvement)
  // ---------------------------------------------------------------------------
  function localKeccak(text) {
    return ethers.keccak256(ethers.toUtf8Bytes(text));
  }

  // ---------------------------------------------------------------------------
  // Render helpers
  // ---------------------------------------------------------------------------
  function showError(msg) {
    document.getElementById("result").innerHTML =
      `<div class="error">${escHtml(msg)}</div>`;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function tsToHuman(unixSecs) {
    return new Date(unixSecs * 1000).toUTCString();
  }

  function normalize(hex) {
    // Ensure consistent 0x-prefixed lowercase for comparison
    return hex ? ("0x" + hex.replace(/^0x/, "").toLowerCase()) : "";
  }

  // ---------------------------------------------------------------------------
  // Main verify flow
  // ---------------------------------------------------------------------------
  async function runVerify() {
    const convId  = document.getElementById("convId").value.trim();
    const rawText = document.getElementById("msgText").value;
    const resultEl = document.getElementById("result");
    const spinner  = document.getElementById("spinner");

    resultEl.innerHTML = "";

    if (!convId) {
      showError("Please enter a Conversation ID.");
      return;
    }

    // Compute local hash before touching the network
    const localHash = rawText ? normalize(localKeccak(rawText)) : null;

    // Build request URL
    const url = new URL(`${API_BASE}/public/verify/${encodeURIComponent(convId)}`);
    if (rawText) url.searchParams.set("text", rawText);

    spinner.style.display = "block";
    let data, status;
    try {
      const resp = await fetch(url.toString(), { method: "GET" });
      status = resp.status;
      data = await resp.json().catch(() => null);
    } catch (_) {
      spinner.style.display = "none";
      showError("Could not reach the server. Check that the API is running and the URL is correct.");
      return;
    }
    spinner.style.display = "none";

    // Error responses
    if (status === 404) {
      showError("No blockchain record found for this conversation. Either the conversation does not exist or on-chain recording has not completed yet.");
      return;
    }
    if (status === 503) {
      showError("Blockchain not configured on this server. The PRIVATE_KEY / CONTRACT_ADDRESS environment variables are not set.");
      return;
    }
    if (status !== 200) {
      const detail = data?.detail ?? "Unknown error";
      showError(`Server returned ${status}: ${detail}`);
      return;
    }

    // Success — render result
    const verified    = data.verified;
    const onChain     = normalize(data.on_chain_digest);
    const serverLocal = normalize(data.local_digest);
    const timestamp   = tsToHuman(data.timestamp);
    const etherscan   = data.etherscan_url;
    const recordIdx   = data.record_index;

    const verdictClass = verified ? "pass" : "fail";
    const verdictLabel = verified ? "✓ PASS — digest matches on-chain record" : "✗ FAIL — digest does not match on-chain record";

    // Compare local browser hash with on-chain hash (only when text was provided)
    let localSection = "";
    if (localHash !== null) {
      const localMatch = localHash === onChain;
      const matchLabel = localMatch
        ? `<span class="match">✓ matches on-chain digest</span>`
        : `<span class="mismatch">✗ does not match on-chain digest</span>`;
      localSection = `
        <div class="local-section">
          <strong>Locally computed keccak256 (browser, no server)</strong>
          <code>${escHtml(localHash)}</code>
          <div style="margin-top:4px;">${matchLabel}</div>
        </div>`;
    }

    resultEl.innerHTML = `
      <div class="verdict ${verdictClass}">${verdictLabel}</div>
      <table>
        <tr><td>Conversation ID</td><td>${escHtml(data.conversation_id)}</td></tr>
        <tr><td>Record index</td><td>${escHtml(String(recordIdx))}</td></tr>
        <tr><td>On-chain digest</td><td><code>${escHtml(onChain)}</code></td></tr>
        <tr><td>Server local digest</td><td><code>${escHtml(serverLocal)}</code></td></tr>
        <tr><td>Block timestamp</td><td>${escHtml(timestamp)}</td></tr>
        <tr><td>Etherscan</td><td><a href="${escHtml(etherscan)}" target="_blank" rel="noopener">${escHtml(etherscan)}</a></td></tr>
      </table>
      ${localSection}`;
  }
</script>

</body>
</html>

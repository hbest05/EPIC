<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alphra — Sign in</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- =====================================================================
       AUTH SECTION — shown when no session is present
  ====================================================================== -->
  <section id="auth-section">

    <!-- Looping video background -->
    <video class="auth-video-bg" autoplay loop muted playsinline>
      <source src="/public/backgroundLogin.mp4" type="video/mp4" />
    </video>
    <div class="auth-video-overlay"></div>

    <!-- Top-left brand -->
    <div class="auth-brand">
      <img src="/public/chipmunkLogo.svg" alt="Alphra" />
      <span class="auth-brand-name">Alphra</span>
    </div>

    <!-- LEFT HALF -->
    <div class="auth-left">
      <img class="auth-blockchain-symbol" src="/public/blockchainSymbol.svg" alt="" />
      <div class="auth-tagline">
        <h1>Private messages.<br>Public proof.</h1>
        <p>End-to-end encrypted. Blockchain verified. Only you hold the keys.</p>
      </div>
    </div>

    <!-- RIGHT HALF -->
    <div class="auth-right">
      <div class="auth-form-container" id="login-form">

        <div id="registered-banner">Account created — please sign in</div>

        <div class="auth-heading">
          <img src="/public/chipmunkLogo.svg" alt="" />
          <h2>Sign in</h2>
        </div>

        <p class="auth-sublink">or <a href="register.html">register for an account</a></p>

        <div class="field">
          <input type="text" id="login-username" placeholder="Username" autocomplete="username" />
          <span class="field-error" id="login-username-error"></span>
        </div>
        <div class="field">
          <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" />
          <span class="field-error" id="login-password-error"></span>
        </div>
        <span class="field-error form-error" id="login-form-error"></span>

        <button class="auth-submit-btn" id="btn-login">Enter</button>

        <a class="auth-verify-link" href="verify.html">Verify a message on the blockchain →</a>

      </div>
    </div>

  </section>

  <!-- =====================================================================
       MAIN APP SECTION — shown after successful login
  ====================================================================== -->
  <section id="app-section" style="display:none;">

    <!-- Full-page grainy background + dark overlay -->
    <img class="chat-bg" src="/public/messagePageBackground.svg" alt="" />
    <div class="chat-overlay"></div>

    <!-- SIDEBAR -->
    <aside id="sidebar">

      <!-- My username header -->
      <div id="sidebar-header">
        <svg class="user-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="9"  r="3"/>
          <path d="M6.2 20.4a6 6 0 0 1 11.6 0"/>
        </svg>
        <span id="my-username-display"></span>
      </div>

      <!-- Search conversations -->
      <div class="sidebar-pill search-pill">
        <svg class="pill-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" id="search-conversations" placeholder="Search conversations" autocomplete="off" />
      </div>

      <!-- Add friend — wraps existing new-contact + btn-add-contact -->
      <div class="sidebar-pill add-friend-pill">
        <button id="btn-add-contact" class="add-icon-btn" aria-label="Add friend">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M8 3v10M3 8h10"/>
          </svg>
        </button>
        <input type="text" id="new-contact" placeholder="Add friend" autocomplete="off" />
      </div>

      <!-- Conversation list -->
      <ul id="contact-list"></ul>

      <!-- Bottom: chipmunk logo + logout -->
      <div id="sidebar-footer">
        <img src="/public/chipmunkLogo.svg" id="sidebar-logo" alt="Alphra" />
        <button id="btn-logout" class="logout-btn">Logout</button>
      </div>

    </aside>

    <!-- CHAT PANEL -->
    <main id="chat-area">

      <!-- Top bar -->
      <header id="chat-header">
        <div id="chat-header-left">
          <!-- Hamburger: mobile only -->
          <button id="menu-toggle" aria-label="Open sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <path d="M3 6h18M3 12h18M3 18h18"/>
            </svg>
          </button>
          <svg class="user-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="9"  r="3"/>
            <path d="M6.2 20.4a6 6 0 0 1 11.6 0"/>
          </svg>
          <span id="chat-recipient">Select a conversation</span>
        </div>
        <!-- Inline blockchain verify — shown once a contact is selected -->
        <button id="btn-verify-chain" class="verify-pill" style="display:none;">verify</button>
      </header>

      <!-- Key fingerprint display (populated when contact selected) -->
      <div id="chat-fp">
        <span id="chat-fp-text"></span>
        <button id="btn-copy-fp" aria-label="Copy key fingerprint" style="display:none;">
          <svg id="copy-fp-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <rect x="5" y="5" width="8" height="10" rx="1.5"/>
            <path d="M3 11V3a1 1 0 0 1 1-1h8"/>
          </svg>
        </button>
      </div>

      <!-- Inline blockchain verify result panel -->
      <div id="verify-result-panel" style="display:none;"></div>

      <!-- Message area -->
      <div id="messages-wrapper">
        <button id="btn-load-older" style="display:none;">Load older messages</button>
        <div id="message-list"></div>
      </div>

      <!-- Compose bar -->
      <footer id="compose-area">
        <textarea id="plaintext-input" placeholder="type message here" rows="1"></textarea>
        <button id="btn-send" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M22 2L11 13"/>
            <path d="M22 2L15 22l-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </footer>

    </main>

  </section>

  <script type="module" src="crypto.js?v=6"></script>
  <script type="module" src="app.js?v=6"></script>
</body>
</html>
